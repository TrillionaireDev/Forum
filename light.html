<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamp + Plasma Field</title>

<style>
  body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    background:#05080c;
    overflow:hidden;
  }

  .scene{
    position:relative;
    width:100%;
    height:100%;
    transform:translate(-80px, 60px);
  }

  .light{
    position:absolute;
    width:320px;
    height:320px;
    left:calc(50% + 95px);
    bottom:185px;
    transform:translateX(-50%);
    z-index:0;
    border-radius:50%;
  }

  /* subtle noise */
  .light::before{
    content:"";
    position:absolute;
    inset:-90px;
    border-radius:50%;
    background:
      repeating-radial-gradient(
        circle at center,
        rgba(255,255,255,0.01) 0px,
        rgba(255,255,255,0.01) 1px,
        transparent 2px,
        transparent 5px
      );
    mix-blend-mode:overlay;
    opacity:.15;
    filter:blur(.4px);
  }

  .glow-outer{
    position:absolute;
    inset:-80px;
    background:radial-gradient(
      circle at center,
      rgba(0,120,140,.035) 0%,
      rgba(0,90,120,.025) 45%,
      rgba(0,40,80,.02) 70%,
      transparent 100%
    );
    filter:blur(30px);
    border-radius:50%;
    opacity:.6;
  }

  .glow{
    position:absolute;
    inset:-10px;
    background:radial-gradient(
      circle at center,
      rgba(0,140,160,.10) 0%,
      rgba(0,110,150,.07) 30%,
      rgba(0,70,120,.05) 55%,
      rgba(0,40,90,.03) 80%,
      transparent 100%
    );
    filter:blur(20px);
    border-radius:50%;
  }

  .bulb{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:40px;
    height:40px;
    border-radius:50%;
    background:radial-gradient(
      circle at center,
      rgba(0,140,160,.08) 0%,
      rgba(0,90,130,.04) 45%,
      transparent 80%
    );
    opacity:.35;
    filter:blur(30px);
  }

  .light::after{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    background:radial-gradient(
      circle at center,
      rgba(0,20,40,0.5) 0%,
      rgba(0,20,40,0.3) 20%,
      rgba(0,20,40,0.15) 40%,
      transparent 65%
    );
    filter:blur(16px);
  }

  .lamp{
    position:relative;
    width:14px;
    height:380px;
    margin:auto;
    z-index:2;
  }

  .pole{
    position:absolute;
    bottom:0;
    left:50%;
    width:8px;
    height:320px;
    transform:translateX(-50%);
    background:
      linear-gradient(to right,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.25) 25%,
        #2a2f36 50%,
        rgba(255,255,255,0.06) 80%,
        rgba(255,255,255,0.12) 100%
      );
  }

  .arm{
    position:absolute;
    top:60px;
    left:50%;
    width:120px;
    height:6px;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.05),
        rgba(0,0,0,0.25)
      ),
      linear-gradient(to right,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.25) 25%,
        #2a2f36 50%,
        rgba(255,255,255,0.06) 80%,
        rgba(255,255,255,0.12) 100%
      );
    transform:translateX(-10px) rotate(-5deg);
    transform-origin:left center;
    display:flex;
    align-items:flex-start;
    justify-content:flex-end;
  }

  .head{
    position:relative;
    top:-3px;
    width:34px;
    height:22px;
    margin-left:-5px;
    border-radius:4px 4px 11px 11px;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.06),
        rgba(0,0,0,0.35)
      ),
      linear-gradient(to right,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.25) 25%,
        #3a3f46 50%,
        rgba(255,255,255,0.06) 80%,
        rgba(255,255,255,0.12) 100%
      );
    box-shadow:
      inset 0 -5px 8px rgba(0,0,0,.4),
      0 1px 2px rgba(0,0,0,.35);
  }
</style>
</head>

<body>

<div class="scene">
  <div class="light">
    <div class="glow-outer"></div>
    <div class="glow"></div>
    <div class="bulb"></div>
  </div>

  <div class="lamp">
    <div class="pole"></div>
    <div class="arm">
      <div class="head"></div>
    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Typing Drops Random Leaves</title>
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.scene {
  position: relative;
  width: 520px;
  height: 320px;
}

/* hidden measure */
.measure {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  padding: 0;
  margin: 0;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 34px;
  letter-spacing: 0;
}

/* text field */
.typing {
  position: absolute;
  left: 40px;
  top: 80px;
  width: 440px;
  height: 60px;
  z-index: 20;
}

.typing input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 34px;
  color: #777;
  padding: 0 8px;
}

.typing input::placeholder {
  color: #777;
}

/* branch */
.line {
  position: absolute;
  width: 300px;
  height: 40px;
  background: #1f1b19;
}

.line1 {
  top: 125px;
  left: 95px;
  transform: rotate(-2deg);
  opacity: 1;
  z-index: 10;
  clip-path: polygon(
    0% 36%, 14% 36%,
    19% 18%, 24% 44%, 29% 22%,
    41% 40%, 70% 40%,
    100% 40%, 100% 74%, 70% 74%,
    29% 88%, 21% 69%,
    11% 74%, 0% 74%
  );
}

.line2 {
  top: 135px;
  left: 110px;
  transform: rotate(1deg);
  opacity: 1;
  filter: blur(0.25px);
  z-index: 11;
  clip-path: polygon(
    0% 40%, 18% 40%,
    26% 60%, 32% 28%, 38% 55%,
    52% 42%, 65% 42%,
    72% 20%, 80% 48%,
    100% 42%, 100% 70%, 75% 70%,
    60% 85%, 48% 68%,
    30% 78%, 18% 65%,
    8% 72%, 0% 72%
  );
}

/* leaf wrappers */
.leaf-wrap {
  position: absolute;
  width: 60px;
  height: 40px;
  transform-origin: 50% 50%;
}

.leaf-wrap.behind {
  z-index: 5;
}

.leaf-wrap.front {
  z-index: 14;
}

.leaf {
  position: absolute;
  inset: 0;
  background: #356f35;
}

.leaf-a {
  border-radius: 100% 0% 90% 0% / 90% 0% 100% 0%;
}

.leaf-b {
  border-radius: 70% 20% 100% 0% / 100% 10% 80% 0%;
}

.leaf-wrap.falling {
  animation: leafFall 2.9s ease-in forwards;
}

.leaf-wrap.reattach {
  animation: reattach 260ms ease-out forwards;
}

@keyframes leafFall {
  0% {
    opacity: 1;
  }
  12% {
    transform:
      translate(4px, 10px)
      rotate(18deg);
  }
  35% {
    transform:
      translate(-10px, 70px)
      rotate(100deg);
  }
  60% {
    transform:
      translate(12px, 140px)
      rotate(175deg);
  }
  100% {
    transform:
      translate(-8px, 240px)
      rotate(255deg);
    opacity: 0;
  }
}

@keyframes reattach {
  0% {
    opacity: 0.5;
  }
  100% {
    opacity: 1;
  }
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="typing">
    <input id="branchInput" placeholder="Statement..." />
  </div>
  <span class="measure" id="measure"></span>

  <div class="line line1"></div>
  <div class="line line2"></div>
</div>

<script>
const scene = document.getElementById("scene");
const input = document.getElementById("branchInput");
const measure = document.getElementById("measure");

const leftPadding = 8;
let prevTextWidth = 0;
let leaves = [];

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function randInt(min, max) {
  return Math.floor(rand(min, max + 1));
}

/*
  Approximate top surface of branch across x.
*/
function branchSurfaceY(x) {
  const startX = 95;
  const startY = 135;
  const slope = 0.03;
  return startY + (x - startX) * slope;
}

function createLeaf(index) {
  const wrap = document.createElement("div");
  wrap.className = "leaf-wrap";
  wrap.dataset.fallen = "false";

  const leaf = document.createElement("div");
  leaf.className = "leaf";

  const type = Math.random() < 0.5 ? "leaf-a" : "leaf-b";
  leaf.classList.add(type);

  const depthClass = Math.random() < 0.45 ? "behind" : "front";
  wrap.classList.add(depthClass);

  const anchorX = randInt(120, 340);
  const anchorY = branchSurfaceY(anchorX);

  const angle =
    depthClass === "behind"
      ? rand(-75, 10)
      : rand(-55, 95);

  const lift =
    depthClass === "behind"
      ? rand(-34, -18)
      : rand(-28, -10);

  const angleRad = angle * Math.PI / 180;
  const offsetX = Math.cos(angleRad) * lift;
  const offsetY = Math.sin(angleRad) * lift;

  const width = 60;
  const height = 40;

  const left = anchorX - width / 2 + offsetX;
  const top = anchorY - height / 2 + offsetY;

  wrap.style.left = `${left}px`;
  wrap.style.top = `${top}px`;
  wrap.dataset.baseTransform = `rotate(${angle}deg)`;
  wrap.style.transform = wrap.dataset.baseTransform;
  wrap.dataset.anchor = anchorX;

  if (depthClass === "behind") {
    wrap.style.opacity = "0.92";
  }

  wrap.appendChild(leaf);
  scene.appendChild(wrap);
  return wrap;
}

function buildLeaves() {
  leaves.forEach(leaf => leaf.remove());
  leaves = [];

  const count = randInt(6, 9);
  for (let i = 0; i < count; i++) {
    leaves.push(createLeaf(i));
  }
}

function getTextWidth() {
  measure.textContent = input.value || "";
  return measure.offsetWidth;
}

function dropLeaf(leaf) {
  if (leaf.dataset.fallen === "true") return;

  leaf.classList.remove("reattach");
  void leaf.offsetWidth;
  leaf.classList.add("falling");
  leaf.dataset.fallen = "true";
}

function reattachLeaf(leaf) {
  if (leaf.dataset.fallen !== "true") return;

  leaf.classList.remove("falling");
  void leaf.offsetWidth;
  leaf.classList.add("reattach");
  leaf.style.transform = leaf.dataset.baseTransform;
  leaf.dataset.fallen = "false";
}

function updateLeaves(event) {
  const textWidth = getTextWidth();
  const cutStart = leftPadding;
  const cutEnd = leftPadding + textWidth;
  const prevCutEnd = leftPadding + prevTextWidth;

  const isDeletion =
    (event && event.inputType && event.inputType.startsWith("delete")) ||
    textWidth < prevTextWidth;

  leaves.forEach((leaf) => {
    const anchor = parseFloat(leaf.dataset.anchor);

    if (!isDeletion) {
      if (anchor >= cutStart && anchor <= cutEnd) {
        dropLeaf(leaf);
      }
    } else {
      const wasInsideBefore = anchor >= cutStart && anchor <= prevCutEnd;
      const isStillInside = anchor >= cutStart && anchor <= cutEnd;

      if (wasInsideBefore && !isStillInside) {
        reattachLeaf(leaf);
      }
    }
  });

  prevTextWidth = textWidth;
}

buildLeaves();
input.addEventListener("input", updateLeaves);
updateLeaves();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.browser-window {
  width: 90%;
  max-width: 900px;
  min-height: 500px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* search */
.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
}

.search-container input[type="text"] {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
}

/* content */
.button-field {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  flex-grow: 1;
  overflow-y: auto;
}

/* DFI box */
.dfi-box {
  border: 2px solid #333;
  border-radius: 10px;
  padding: 25px;
  background: #111;
  line-height: 1.6;
}

/* STACK MENU (your art part) */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 20px;
  border-top: 2px solid #333;
}

/* ONLY stack buttons get extrusion */
.stack button {
  background: #111;
  border: none;
  color: #777;
  font-size: 12px;
  padding: 6px 10px;
  margin: 2px 0;
  cursor: pointer;

  box-shadow:
    -1px -1px 0 #444,
    -2px -2px 0 #3a3a3a,
    -3px -3px 0 #333,
    -4px -4px 0 #2a2a2a,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

/* hover */
.stack button:hover {
  color: #fff;
  box-shadow:
    -1px -1px 0 #666,
    -2px -2px 0 #555,
    -3px -3px 0 #444,
    -4px -4px 0 #333,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

/* press */
.stack button:active {
  box-shadow:
    -1px -1px 0 #333,
    -2px -2px 0 #222,
    -3px -3px 0 #111;
}
</style>
</head>

<body>

<div class="browser-window">

  <!-- Search -->
  <div class="search-container">
    <input type="text" placeholder="Search">
    <button id="dateBtn">Date</button>
  </div>

  <!-- Content -->
  <div class="button-field" id="buttonField"></div>

  <!-- STACK MENU (ADDED HERE) -->
  <div class="stack">
    <button onclick="show('form')">form</button>
    <button onclick="show('forum')">forum</button>
    <button onclick="show('privacy')">privacy</button>
    <button onclick="show('formula')">.formula</button>
  </div>

</div>

<script>
const buttonField = document.getElementById('buttonField');

function renderDefaultMessage() {
  buttonField.innerHTML = `
    <div class="dfi-box">
      <h1>What is DFI?</h1>
      <p>The question can be thought of as an opinion.</p>
    </div>
  `;
}

function show(type) {
  if (type === 'privacy') {
    buttonField.innerHTML = `
      <div class="dfi-box">
        The form submission on drugfreeinu.forum does not send, store, or record data.
      </div>
    `;
  }

  if (type === 'formula') {
    buttonField.innerHTML = `
      <div class="dfi-box">
        <strong>art + thought = theory</strong>
      </div>
    `;
  }

  if (type === 'forum') {
    renderDefaultMessage();
  }

  if (type === 'form') {
    buttonField.innerHTML = `
      <div class="dfi-box">Form goes here</div>
    `;
  }
}

renderDefaultMessage();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.browser-window {
  width: 90vw;
  height: 85vh;
  max-width: 1100px;
  max-height: 750px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Search */
.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.search-container input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
}

/* Main content */
.button-field {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* DFI Box */
.dfi-box {
  border: 2px solid #333;
  border-radius: 10px;
  padding: 25px;
  background: #111;
  line-height: 1.6;
}

.dfi-box h1 {
  margin: 0 0 20px 0;
  font-size: 2rem;
  color: #f2f2f2;
}

.dfi-box p {
  margin: 0 0 20px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .section-title {
  margin-bottom: 12px;
  font-weight: 700;
  color: #f2f2f2;
}

.dfi-box ul {
  margin: 0 0 28px 0;
  padding-left: 28px;
}

.dfi-box li {
  margin: 6px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .footer-text {
  margin-top: 10px;
  font-size: 1rem;
  color: #f2f2f2;
}

/* Clickable post preview */
.post-preview {
  cursor: pointer;
  display: inline-block;
  padding: 10px 14px;
  border-radius: 10px;
  width: fit-content;
  min-width: 0;
  max-width: none;
}

.post-title {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 700;
  color: #f2f2f2;
  line-height: 1.2;
}

/* Forum post row */
.post-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: flex-start;
}

/* Bottom area */
#menuMount {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  padding: 20px;
  border-top: 2px solid #333;
  flex-shrink: 0;
  min-height: 170px;
  box-sizing: border-box;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex-shrink: 0;
}

/* stack buttons */
.stack button {
  background: #111;
  border: none;
  color: #777;
  font-size: 14px;
  padding: 9px 16px;
  margin: 4px 0;
  cursor: pointer;

  box-shadow:
    -1px -1px 0 #444,
    -2px -2px 0 #3a3a3a,
    -3px -3px 0 #333,
    -4px -4px 0 #2a2a2a,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

.stack button:hover {
  color: #fff;
  box-shadow:
    -1px -1px 0 #666,
    -2px -2px 0 #555,
    -3px -3px 0 #444,
    -4px -4px 0 #333,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

.stack button:active {
  box-shadow:
    -1px -1px 0 #333,
    -2px -2px 0 #222,
    -3px -3px 0 #111;
}

.stack button.active {
  color: #fff;
  box-shadow:
    -1px -1px 0 #777,
    -2px -2px 0 #666,
    -3px -3px 0 #555,
    -4px -4px 0 #444,
    -5px -5px 0 #333,
    -6px -6px 0 #222,
    -7px -7px 0 #111;
}

/* right-side panel */
.side-info {
  flex: 1;
  min-width: 0;
  max-width: 100%;
  min-height: 120px;
  padding-top: 8px;
  padding-left: 12px;
  padding-right: 12px;
  overflow-y: auto;
  display: flex;
  justify-content: center;
}

.side-info-inner {
  width: 100%;
  max-width: 540px;
}

.side-info p {
  margin: 0 0 14px 0;
  font-size: 0.92rem;
  line-height: 1.5;
  color: #d0d0d0;
}

.side-info strong {
  font-size: 1rem;
  color: #f2f2f2;
}

/* phone */
@media (max-width: 700px) {
  .browser-window {
    width: 94vw;
    height: 88vh;
  }

  #menuMount {
    gap: 18px;
    padding: 16px;
  }

  .stack button {
    font-size: 13px;
    padding: 8px 14px;
  }
}
</style>
</head>

<body>

<div class="browser-window">

  <!-- Search -->
  <div class="search-container">
    <input type="text" placeholder="Search">
    <button id="dateBtn">Date</button>
  </div>

  <!-- Main content -->
  <div class="button-field" id="buttonField"></div>

  <!-- Bottom area -->
  <div id="menuMount">
    <div class="stack">
      <button data-type="form" onclick="show('form')">form</button>
      <button data-type="forum" onclick="show('forum')">forum</button>
      <button data-type="privacy" onclick="show('privacy')">privacy</button>
      <button data-type="formula" onclick="show('formula')">.formula</button>
    </div>

    <div class="side-info" id="sideInfo"></div>
  </div>

</div>

<script>
const buttonField = document.getElementById('buttonField');
const sideInfo = document.getElementById('sideInfo');
const dateBtn = document.getElementById('dateBtn');

function setActiveButton(type) {
  document.querySelectorAll('.stack button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
}

function togglePost(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.style.display = (el.style.display === 'none' || el.style.display === '')
    ? 'block'
    : 'none';
}

/* default forum content from separate files */
function renderDefaultMessage() {
  Promise.all([
    fetch('what.html').then(res => res.text()),
    fetch('when.html').then(res => res.text())
  ])
  .then(([what, when]) => {
    buttonField.innerHTML = `
      <div class="post-row">
        ${what}
        ${when}
      </div>
    `;
  })
  .catch(() => {
    buttonField.innerHTML = `
      <div class="dfi-box">
        <p>Unable to load forum posts.</p>
      </div>
    `;
  });
}

/* navigation */
function show(type) {
  setActiveButton(type);

  if (type === 'form') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>Screenshot or copy&amp;paste the form to save it.</p>
      </div>
    `;
    return;
  }

  if (type === 'privacy') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
        </p>
        <p>(select to view the code)</p>
      </div>
    `;
    return;
  }

  if (type === 'formula') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>A calculation to see how the theories on .forum came from using the art of thought.</p>
        <p><strong>art + thought = theory</strong></p>
      </div>
    `;
    return;
  }

  if (type === 'forum') {
    renderDefaultMessage();
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          Information and beliefs from the artist’s mind behind DFI.
        </p>
      </div>
    `;
    return;
  }
}

dateBtn.addEventListener('click', () => {
  alert("Date button clicked.");
});

/* start on forum */
show('forum');
</script>

</body>
</html>

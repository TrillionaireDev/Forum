<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

* {
  box-sizing: border-box;
}

.browser-window {
  width: 90vw;
  height: 85vh;
  max-width: 1100px;
  max-height: 750px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Search */
.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.search-container input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
}

/* Main content */
.button-field {
  position: relative;
  padding: 20px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* DFI Box */
.dfi-box {
  border: 2px solid #333;
  border-radius: 10px;
  padding: 25px;
  background: #111;
  line-height: 1.6;
}

.dfi-box h1 {
  margin: 0 0 20px 0;
  font-size: 2rem;
  color: #f2f2f2;
}

.dfi-box p {
  margin: 0 0 20px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .section-title {
  margin-bottom: 12px;
  font-weight: 700;
  color: #f2f2f2;
}

.dfi-box ul {
  margin: 0 0 28px 0;
  padding-left: 28px;
}

.dfi-box li {
  margin: 6px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .footer-text {
  margin-top: 10px;
  font-size: 1rem;
  color: #f2f2f2;
}

/* Clickable post preview */
.post-preview {
  cursor: pointer;
  display: inline-block;
  padding: 10px 14px;
  border-radius: 10px;
  width: fit-content;
  min-width: 0;
  max-width: none;
}

.post-title {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 700;
  color: #f2f2f2;
  line-height: 1.2;
}

/* Floating forum field */
.post-row {
  position: relative;
  width: 100%;
  height: 100%;
}

.floating-post {
  position: absolute;
  will-change: transform;
  max-width: 360px;
  transition: transform 0.6s ease, opacity 0.3s ease;
}

.floating-post.expanded {
  z-index: 50;
}

.floating-post.expanded .dfi-box {
  transform: scale(1.05, 1.2);
  transition: transform 0.35s ease;
}

.post-dim {
  opacity: 0.2;
}

/* form area */
.form-pair-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.form-pair {
  display: flex;
  gap: 28px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}

.grass-slot {
  width: 260px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* grass field */
.field {
  position: relative;
  width: 260px;
  height: 80px;
  background: #cfcfcf;
  border-radius: 999px;
  overflow: hidden;
}

.measure {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  padding: 0;
  margin: 0;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
  letter-spacing: 0;
}

.field input {
  position: relative;
  z-index: 4;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
  letter-spacing: 0;
  color: #111;
  padding: 0 16px;
}

.field input::placeholder {
  color: #666;
}

.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: -2px;
  height: 64px;
  z-index: 2;
  pointer-events: none;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%, 70% 20%, 100% 100%, 0% 100%, 30% 20%);
  transition: height 180ms ease, transform 180ms ease;
}

.clippings {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.clip-piece {
  position: absolute;
  width: 3px;
  border-radius: 50% 50% 0 0;
  clip-path: polygon(50% 0%, 70% 20%, 100% 100%, 0% 100%, 30% 20%);
  transform-origin: bottom center;
  animation: fall 650ms ease-in forwards;
  opacity: 0.95;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(var(--start-rot));
    opacity: 0.95;
  }
  70% {
    opacity: 0.85;
  }
  100% {
    transform: translateY(var(--fall-y)) translateX(var(--drift-x)) rotate(var(--end-rot));
    opacity: 0;
  }
}

/* Bottom area */
#menuMount {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  padding: 20px;
  border-top: 2px solid #333;
  flex-shrink: 0;
  min-height: 170px;
  box-sizing: border-box;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex-shrink: 0;
}

/* layered menu items */
.stack-item {
  position: relative;
  display: inline-block;
  margin: 6px 0;
  cursor: pointer;
}

.stack-item button {
  position: relative;
  z-index: 10;
  background: #111;
  border: none;
  color: #777;
  font-size: 14px;
  padding: 9px 16px;
  cursor: pointer;
}

.stack-item button:hover,
.stack-item.active button {
  color: #fff;
}

.layer {
  position: absolute;
  inset: 0;
  border-radius: 4px;
  z-index: 1;
}

.l1 { --x:-1px; --y:-1px; transform: translate(var(--x), var(--y)); background:#444; }
.l2 { --x:-2px; --y:-2px; transform: translate(var(--x), var(--y)); background:#3a3a3a; }
.l3 { --x:-3px; --y:-3px; transform: translate(var(--x), var(--y)); background:#333; }
.l4 { --x:-4px; --y:-4px; transform: translate(var(--x), var(--y)); background:#2a2a2a; }
.l5 { --x:-5px; --y:-5px; transform: translate(var(--x), var(--y)); background:#222; }
.l6 { --x:-6px; --y:-6px; transform: translate(var(--x), var(--y)); background:#1a1a1a; }
.l7 { --x:-7px; --y:-7px; transform: translate(var(--x), var(--y)); background:#111; }

.stack-item:active {
  transform: translate(1px, 1px);
}

/* right-side panel */
.side-info {
  flex: 1;
  min-width: 0;
  max-width: 100%;
  min-height: 120px;
  padding-top: 8px;
  padding-left: 12px;
  padding-right: 12px;
  overflow-y: auto;
  display: flex;
  justify-content: center;
}

.side-info-inner {
  width: 100%;
  max-width: 540px;
}

.side-info p {
  margin: 0 0 14px 0;
  font-size: 0.92rem;
  line-height: 1.5;
  color: #d0d0d0;
}

.side-info strong {
  font-size: 1rem;
  color: #f2f2f2;
}

/* phone */
@media (max-width: 700px) {
  .browser-window {
    width: 94vw;
    height: 88vh;
  }

  #menuMount {
    gap: 18px;
    padding: 16px;
  }

  .stack-item button {
    font-size: 13px;
    padding: 8px 14px;
  }

  .floating-post {
    max-width: 280px;
  }

  .grass-slot {
    width: 260px;
    height: 80px;
  }
}
</style>
</head>

<body>

<div class="browser-window">

  <div class="search-container">
    <input type="text" placeholder="Search">
    <button id="dateBtn">Date</button>
  </div>

  <div class="button-field" id="buttonField"></div>

  <div id="menuMount">
    <div id="menuButtons"></div>
    <div class="side-info" id="sideInfo"></div>
  </div>

</div>

<script src="js/floatingPosts.js"></script>

<script>
const buttonField = document.getElementById('buttonField');
const sideInfo = document.getElementById('sideInfo');
const dateBtn = document.getElementById('dateBtn');

function setActiveButton(type) {
  document.querySelectorAll('.stack-item').forEach(item => {
    item.classList.toggle('active', item.dataset.type === type);
  });
}

function togglePost(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.style.display = (el.style.display === 'none' || el.style.display === '')
    ? 'block'
    : 'none';
}

function renderDefaultMessage() {
  stopFloatingPosts();

  Promise.all([
    fetch('what.html').then(res => res.text()),
    fetch('when.html').then(res => res.text())
  ])
  .then(([what, when]) => {
    buttonField.innerHTML = `
      <div class="post-row" id="postField">
        <div class="floating-post" id="post1" onclick="expandPost(this)">${what}</div>
        <div class="floating-post" id="post2" onclick="expandPost(this)">${when}</div>
      </div>
    `;

    requestAnimationFrame(() => {
      startFloatingPosts();
    });
  })
  .catch(() => {
    buttonField.innerHTML = `
      <div class="dfi-box">
        <p>Unable to load forum posts.</p>
      </div>
    `;
  });
}

function mountGrassField(target) {
  target.innerHTML = `
    <div class="field">
      <div class="grass-strip"></div>
      <div class="clippings"></div>
      <input class="grass-input" placeholder="Statement..." />
      <span class="measure"></span>
    </div>
  `;

  const grassStrip = target.querySelector(".grass-strip");
  const clippings = target.querySelector(".clippings");
  const input = target.querySelector(".grass-input");
  const measure = target.querySelector(".measure");

  const bladeCount = 95;
  const blades = [];
  const leftPadding = 16;
  let prevTextWidth = 0;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function makeBlade(i) {
    const blade = document.createElement("div");
    blade.className = "blade";

    let baseHeight;
    const r = Math.random();

    if (r < 0.2) {
      baseHeight = rand(14, 24);
    } else if (r < 0.7) {
      baseHeight = rand(24, 40);
    } else {
      baseHeight = rand(42, 60);
    }

    const tilt = rand(-14, 14);
    const hue = rand(105, 128);
    const light = rand(26, 44);

    blade.dataset.baseHeight = baseHeight.toFixed(2);
    blade.dataset.currentHeight = baseHeight.toFixed(2);
    blade.dataset.baseTilt = tilt.toFixed(2);

    blade.style.left = `${i * 1.05}%`;
    blade.style.height = `${baseHeight}px`;
    blade.style.transform = `rotate(${tilt}deg)`;
    blade.style.background = `hsl(${hue}, 50%, ${light}%)`;

    grassStrip.appendChild(blade);
    blades.push(blade);
  }

  for (let i = 0; i < bladeCount; i++) {
    makeBlade(i);
  }

  function getTextWidth() {
    measure.textContent = input.value || "";
    return measure.offsetWidth;
  }

  function spawnClipping(blade, cutAmountPx) {
    if (cutAmountPx < 6) return;

    const bladeLeft = blade.offsetLeft;
    const oldHeight = parseFloat(blade.dataset.currentHeight);
    const tilt = parseFloat(blade.dataset.baseTilt);
    const color = blade.style.background;

    const piece = document.createElement("div");
    piece.className = "clip-piece";
    piece.style.left = `${bladeLeft}px`;
    piece.style.bottom = `${Math.max(0, oldHeight - cutAmountPx)}px`;
    piece.style.height = `${Math.max(5, cutAmountPx)}px`;
    piece.style.background = color;
    piece.style.setProperty("--start-rot", `${tilt}deg`);
    piece.style.setProperty("--end-rot", `${tilt + rand(-18, 18)}deg`);
    piece.style.setProperty("--fall-y", `${rand(14, 28)}px`);
    piece.style.setProperty("--drift-x", `${rand(-4, 4)}px`);

    clippings.appendChild(piece);
    piece.addEventListener("animationend", () => piece.remove());
  }

  function updateGrass(event) {
    const textWidth = getTextWidth();
    const cutStart = leftPadding;
    const cutEnd = leftPadding + textWidth;

    const prevCutEnd = leftPadding + prevTextWidth;
    const isDeletion =
      (event && event.inputType && event.inputType.startsWith("delete")) ||
      textWidth < prevTextWidth;

    blades.forEach((blade) => {
      const bladeLeft = blade.offsetLeft;
      const bladeCenter = bladeLeft + 1.5;
      const baseHeight = parseFloat(blade.dataset.baseHeight);
      const prevHeight = parseFloat(blade.dataset.currentHeight);
      const baseTilt = parseFloat(blade.dataset.baseTilt);

      const softness = 16;
      let influence = 0;

      if (bladeCenter >= cutStart && bladeCenter <= cutEnd) {
        const distToEdge = Math.min(bladeCenter - cutStart, cutEnd - bladeCenter);
        influence = Math.min(1, 0.75 + distToEdge / 24);
      } else if (bladeCenter > cutEnd && bladeCenter < cutEnd + softness) {
        influence = 1 - (bladeCenter - cutEnd) / softness;
      } else if (bladeCenter < cutStart && bladeCenter > cutStart - softness) {
        influence = 1 - (cutStart - bladeCenter) / softness;
      }

      influence = Math.max(0, Math.min(influence, 1));

      let targetHeight = baseHeight;

      if (textWidth > 0 && influence > 0) {
        const cutStrength = baseHeight > 40 ? 0.82 : baseHeight > 24 ? 0.72 : 0.58;
        targetHeight = Math.max(5, baseHeight * (1 - influence * cutStrength));
      }

      const newTilt = baseTilt * (1 - influence * 0.6);
      const cutAmountPx = prevHeight - targetHeight;

      blade.style.transitionDelay = "0ms";

      if (!isDeletion && cutAmountPx > 7 && Math.random() < 0.35) {
        spawnClipping(blade, cutAmountPx * rand(0.55, 0.9));
      }

      if (isDeletion && prevTextWidth > textWidth) {
        const inRegrowBand = bladeCenter > cutEnd && bladeCenter <= prevCutEnd;

        if (inRegrowBand) {
          const distFromOldRight = prevCutEnd - bladeCenter;
          const maxBand = Math.max(prevCutEnd - cutEnd, 1);
          const progress = distFromOldRight / maxBand;
          const delay = progress * 220;
          blade.style.transitionDelay = `${delay}ms`;
        }
      }

      blade.dataset.currentHeight = targetHeight.toFixed(2);
      blade.style.height = `${targetHeight}px`;
      blade.style.transform = `rotate(${newTilt}deg)`;
    });

    prevTextWidth = textWidth;
  }

  input.addEventListener("input", updateGrass);
  updateGrass();
}

function renderFormFields() {
  stopFloatingPosts();

  buttonField.innerHTML = `
    <div class="form-pair-wrap">
      <div class="form-pair">
        <div class="grass-slot" id="grassSlot1"></div>
        <div class="grass-slot" id="grassSlot2"></div>
      </div>
    </div>
  `;

  mountGrassField(document.getElementById('grassSlot1'));
  mountGrassField(document.getElementById('grassSlot2'));
}

function show(type) {
  setActiveButton(type);

  if (type !== 'forum') {
    stopFloatingPosts();
  }

  if (type === 'form') {
    renderFormFields();
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>Screenshot or copy&amp;paste the form to save it.</p>
      </div>
    `;
    return;
  }

  if (type === 'privacy') {
    buttonField.innerHTML = '';
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
        </p>
        <p>(select to view the code)</p>
      </div>
    `;
    return;
  }

  if (type === 'formula') {
    buttonField.innerHTML = '';
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>A calculation to see how the theories on .forum came from using the art of thought.</p>
        <p><strong>art + thought = theory</strong></p>
      </div>
    `;
    return;
  }

  if (type === 'forum') {
    renderDefaultMessage();
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          Information and beliefs from the artist’s mind behind DFI.
        </p>
      </div>
    `;
    return;
  }
}

dateBtn.addEventListener('click', () => {
  alert("Date button clicked.");
});

fetch('menu.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('menuButtons').innerHTML = html;
    show('forum');
  })
  .catch(() => {
    document.getElementById('menuButtons').innerHTML = `
      <div class="stack">

        <div class="stack-item" data-type="form" onclick="show('form')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">form</button>
        </div>

        <div class="stack-item" data-type="forum" onclick="show('forum')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">forum</button>
        </div>

        <div class="stack-item" data-type="privacy" onclick="show('privacy')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">privacy</button>
        </div>

        <div class="stack-item" data-type="formula" onclick="show('formula')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">.formula</button>
        </div>

      </div>
    `;
    show('forum');
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.browser-window {
  width: 90%;
  max-width: 900px;
  min-height: 500px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
}

.search-container input[type="text"] {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
  font-size: 1rem;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.search-container button:hover {
  border-color: #caa6ff;
  background: #222;
}

.button-field {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  flex-grow: 1;
  overflow-y: auto;
}

.button-field button {
  padding: 20px;
  border: 2px solid #333;
  border-radius: 8px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  text-align: center;
}
</style>
</head>
<body>

<div class="browser-window">

  <!-- Search -->
  <div class="search-container">
    <input type="text" placeholder="Search" id="searchInput">
    <button id="dateBtn">Date</button>
  </div>

  <!-- Content Area -->
  <div class="button-field" id="buttonField"></div>

</div>

<script>
const buttonField = document.getElementById('buttonField');
const dateBtn = document.getElementById('dateBtn');

function renderDefaultMessage() {
  buttonField.innerHTML = '';

  const btn = document.createElement('button');
  btn.textContent =
    "This forum is the official source of information about DrugFreeInu. Select a topic to explore the ideas and beliefs of DrugFreeInu’s developer.";

  buttonField.appendChild(btn);
}

renderDefaultMessage();

dateBtn.addEventListener('click', () => {
  alert("Date button clicked.");
});
</script>

</body>
</html>

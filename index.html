<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.browser-window {
  width: 90vw;
  height: 85vh;
  max-width: 1100px;
  max-height: 750px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Search */
.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.search-container input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
}

/* Main content */
.button-field {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* DFI Box */
.dfi-box {
  border: 2px solid #333;
  border-radius: 10px;
  padding: 25px;
  background: #111;
  line-height: 1.6;
}

.dfi-box h1 {
  margin: 0 0 20px 0;
  font-size: 2rem;
  color: #f2f2f2;
}

.dfi-box p {
  margin: 0 0 20px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .section-title {
  margin-bottom: 12px;
  font-weight: 700;
  color: #f2f2f2;
}

.dfi-box ul {
  margin: 0 0 28px 0;
  padding-left: 28px;
}

.dfi-box li {
  margin: 6px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .footer-text {
  margin-top: 10px;
  font-size: 1rem;
  color: #f2f2f2;
}

/* Clickable post preview */
.post-preview {
  cursor: pointer;
  display: inline-block;
  padding: 10px 14px;
  border-radius: 10px;
  width: fit-content;
  min-width: 0;
  max-width: none;
}

.post-title {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 700;
  color: #f2f2f2;
  line-height: 1.2;
}

/* Forum post row */
.post-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: flex-start;
}

/* Bottom area */
#menuMount {
  display: flex;
  align-items: flex-start;
  gap: 28px;
  padding: 20px;
  border-top: 2px solid #333;
  flex-shrink: 0;
  min-height: 170px;
  box-sizing: border-box;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex-shrink: 0;
}

/* new layered menu items */
.stack-item {
  position: relative;
  display: inline-block;
  margin: 6px 0;
  cursor: pointer;
}

.stack-item button {
  position: relative;
  z-index: 10;
  background: #111;
  border: none;
  color: #777;
  font-size: 14px;
  padding: 9px 16px;
  cursor: pointer;
}

.stack-item button:hover {
  color: #fff;
}

.stack-item.active button {
  color: #fff;
}

.layer {
  position: absolute;
  inset: 0;
  border-radius: 4px;
  z-index: 1;
}

.l1 { --x:-1px; --y:-1px; transform: translate(var(--x), var(--y)); background:#444; }
.l2 { --x:-2px; --y:-2px; transform: translate(var(--x), var(--y)); background:#3a3a3a; }
.l3 { --x:-3px; --y:-3px; transform: translate(var(--x), var(--y)); background:#333; }
.l4 { --x:-4px; --y:-4px; transform: translate(var(--x), var(--y)); background:#2a2a2a; }
.l5 { --x:-5px; --y:-5px; transform: translate(var(--x), var(--y)); background:#222; }
.l6 { --x:-6px; --y:-6px; transform: translate(var(--x), var(--y)); background:#1a1a1a; }
.l7 { --x:-7px; --y:-7px; transform: translate(var(--x), var(--y)); background:#111; }

@keyframes wave {
  0%   { transform: translate(var(--x), var(--y)); }
  50%  { transform: translate(var(--x), calc(var(--y) - 2px)); }
  100% { transform: translate(var(--x), var(--y)); }
}

.stack-item.active .layer {
  animation: wave 0.7s ease-in-out;
}

.stack-item.active .l1 { animation-delay: 0s; }
.stack-item.active .l2 { animation-delay: 0.05s; }
.stack-item.active .l3 { animation-delay: 0.1s; }
.stack-item.active .l4 { animation-delay: 0.15s; }
.stack-item.active .l5 { animation-delay: 0.2s; }
.stack-item.active .l6 { animation-delay: 0.25s; }
.stack-item.active .l7 { animation-delay: 0.3s; }

/* right-side panel */
.side-info {
  flex: 1;
  min-width: 0;
  max-width: 100%;
  min-height: 120px;
  padding-top: 8px;
  padding-left: 12px;
  padding-right: 12px;
  overflow-y: auto;
  display: flex;
  justify-content: center;
}

.side-info-inner {
  width: 100%;
  max-width: 540px;
}

.side-info p {
  margin: 0 0 14px 0;
  font-size: 0.92rem;
  line-height: 1.5;
  color: #d0d0d0;
}

.side-info strong {
  font-size: 1rem;
  color: #f2f2f2;
}

/* phone */
@media (max-width: 700px) {
  .browser-window {
    width: 94vw;
    height: 88vh;
  }

  #menuMount {
    gap: 18px;
    padding: 16px;
  }

  .stack-item button {
    font-size: 13px;
    padding: 8px 14px;
  }
}
</style>
</head>

<body>

<div class="browser-window">

  <!-- Search -->
  <div class="search-container">
    <input type="text" placeholder="Search">
    <button id="dateBtn">Date</button>
  </div>

  <!-- Main content -->
  <div class="button-field" id="buttonField"></div>

  <!-- Bottom area -->
  <div id="menuMount">
    <!-- menu.html loads here -->
    <div id="menuButtons"></div>

    <div class="side-info" id="sideInfo"></div>
  </div>

</div>

<script>
const buttonField = document.getElementById('buttonField');
const sideInfo = document.getElementById('sideInfo');
const dateBtn = document.getElementById('dateBtn');

function setActiveButton(type) {
  document.querySelectorAll('.stack-item').forEach(item => {
    item.classList.remove('active');
  });

  const active = document.querySelector(`.stack-item[data-type="${type}"]`);
  if (active) {
    void active.offsetWidth;
    active.classList.add('active');
  }
}

function togglePost(id) {
  const el = document.getElementById(id);
  if (!el) return;

  el.style.display = (el.style.display === 'none' || el.style.display === '')
    ? 'block'
    : 'none';
}

/* default forum content from separate files */
function renderDefaultMessage() {
  Promise.all([
    fetch('what.html').then(res => res.text()),
    fetch('when.html').then(res => res.text())
  ])
  .then(([what, when]) => {
    buttonField.innerHTML = `
      <div class="post-row">
        ${what}
        ${when}
      </div>
    `;
  })
  .catch(() => {
    buttonField.innerHTML = `
      <div class="dfi-box">
        <p>Unable to load forum posts.</p>
      </div>
    `;
  });
}

/* navigation */
function show(type) {
  setActiveButton(type);

  if (type === 'form') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>Screenshot or copy&amp;paste the form to save it.</p>
      </div>
    `;
    return;
  }

  if (type === 'privacy') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
        </p>
        <p>(select to view the code)</p>
      </div>
    `;
    return;
  }

  if (type === 'formula') {
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>A calculation to see how the theories on .forum came from using the art of thought.</p>
        <p><strong>art + thought = theory</strong></p>
      </div>
    `;
    return;
  }

  if (type === 'forum') {
    renderDefaultMessage();
    sideInfo.innerHTML = `
      <div class="side-info-inner">
        <p>
          Information and beliefs from the artist’s mind behind DFI.
        </p>
      </div>
    `;
    return;
  }
}

dateBtn.addEventListener('click', () => {
  alert("Date button clicked.");
});

/* load menu */
fetch('menu.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('menuButtons').innerHTML = html;
    show('forum');
  })
  .catch(() => {
    document.getElementById('menuButtons').innerHTML = `
      <div class="stack">

        <div class="stack-item" data-type="form" onclick="show('form')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">form</button>
        </div>

        <div class="stack-item" data-type="forum" onclick="show('forum')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">forum</button>
        </div>

        <div class="stack-item" data-type="privacy" onclick="show('privacy')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">privacy</button>
        </div>

        <div class="stack-item" data-type="formula" onclick="show('formula')">
          <div class="layer l7"></div><div class="layer l6"></div><div class="layer l5"></div>
          <div class="layer l4"></div><div class="layer l3"></div><div class="layer l2"></div><div class="layer l1"></div>
          <button type="button">.formula</button>
        </div>

      </div>
    `;
    show('forum');
  });
</script>

</body>
</html>

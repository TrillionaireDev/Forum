<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFI Forum Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="browser-window">

    <div class="search-container">
      <input type="text" placeholder="Search">
      <button id="dateBtn">Date</button>
    </div>

    <div class="button-field" id="buttonField">
      <iframe
        id="privacyLight"
        class="privacy-light-frame"
        src="light.html"
        title="Privacy Light"
      ></iframe>
    </div>

    <div id="menuMount">
      <div id="menuButtons"></div>
      <div class="side-info" id="sideInfo"></div>
    </div>

  </div>

  <script src="js/floatingPosts.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const label = btn.textContent.trim().toLowerCase();
      const privacyLight = document.getElementById("privacyLight");

      if (label === "privacy") {
        privacyLight.classList.add("show");
      } else if (["form", "forum", ".formula"].includes(label)) {
        privacyLight.classList.remove("show");
      }
    });
  </script>

</body>
</html>

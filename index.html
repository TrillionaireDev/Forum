<!DOCTYPE html>
<html lang="en">
<head>

  <title>DFI Forum Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>

  <script src="js/grass.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

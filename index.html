<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFI Forum Browser</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.browser-window {
  width: 95%;
  max-width: 1200px;
  height: 520px;
  border: 2px solid #333;
  border-radius: 10px;
  background: #111;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Search */
.search-container {
  display: flex;
  padding: 15px 20px;
  background: #222;
  border-bottom: 2px solid #333;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.search-container input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  border: 2px solid #333;
  background: #111;
  color: #e0e0e0;
}

.search-container button {
  padding: 10px 15px;
  border: 2px solid #333;
  border-radius: 6px;
  background: #111;
  color: #caa6ff;
  font-weight: bold;
  cursor: pointer;
}

/* Main content */
.button-field {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* DFI Box */
.dfi-box {
  border: 2px solid #333;
  border-radius: 10px;
  padding: 25px;
  background: #111;
  line-height: 1.6;
}

.dfi-box h1 {
  margin: 0 0 20px 0;
  font-size: 2rem;
  color: #f2f2f2;
}

.dfi-box p {
  margin: 0 0 20px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .section-title {
  margin-bottom: 12px;
  font-weight: 700;
  color: #f2f2f2;
}

.dfi-box ul {
  margin: 0 0 28px 0;
  padding-left: 28px;
}

.dfi-box li {
  margin: 6px 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.dfi-box .footer-text {
  margin-top: 10px;
  font-size: 1rem;
  color: #f2f2f2;
}

/* Clickable post preview */
.post-preview {
  cursor: pointer;
}

.post-title {
  margin: 0;
  font-size: 1.2rem;
  font-weight: 700;
  color: #f2f2f2;
}

/* Bottom area */
#menuMount {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  padding: 20px;
  border-top: 2px solid #333;
  flex-shrink: 0;
  min-height: 170px;
  box-sizing: border-box;
}

/* stack */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex-shrink: 0;
}

/* stack buttons */
.stack button {
  background: #111;
  border: none;
  color: #777;
  font-size: 12px;
  padding: 6px 10px;
  margin: 2px 0;
  cursor: pointer;

  box-shadow:
    -1px -1px 0 #444,
    -2px -2px 0 #3a3a3a,
    -3px -3px 0 #333,
    -4px -4px 0 #2a2a2a,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

.stack button:hover {
  color: #fff;
  box-shadow:
    -1px -1px 0 #666,
    -2px -2px 0 #555,
    -3px -3px 0 #444,
    -4px -4px 0 #333,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

.stack button:active {
  box-shadow:
    -1px -1px 0 #333,
    -2px -2px 0 #222,
    -3px -3px 0 #111;
}

/* right-side panel */
.side-info {
  flex: 1;
  min-width: 0;
  max-width: 100%;
  min-height: 120px;
  padding-top: 4px;
  overflow-y: auto;
}

.side-info p {
  margin: 0 0 12px 0;
  font-size: 0.86rem;
  line-height: 1.45;
  color: #d0d0d0;
}

.side-info strong {
  font-size: 0.95rem;
  color: #f2f2f2;
}
</style>
</head>

<body>

<div class="browser-window">

  <!-- Search -->
  <div class="search-container">
    <input type="text" placeholder="Search">
    <button id="dateBtn">Date</button>
  </div>

  <!-- Main content -->
  <div class="button-field" id="buttonField"></div>

  <!-- Bottom area -->
  <div id="menuMount">
    <div class="stack">
      <button onclick="show('form')">form</button>
      <button onclick="show('forum')">forum</button>
      <button onclick="show('privacy')">privacy</button>
      <button onclick="show('formula')">.formula</button>
    </div>

    <div class="side-info" id="sideInfo"></div>
  </div>

</div>

<script>
const buttonField = document.getElementById('buttonField');
const sideInfo = document.getElementById('sideInfo');
const dateBtn = document.getElementById('dateBtn');

/* default content */
function renderDefaultMessage() {
  buttonField.innerHTML = `
    <div class="dfi-box post-preview" onclick="toggleDFIPost()">
      <p class="post-title">What is DFI?</p>
      <div id="dfiPostContent" style="display:none; margin-top:15px;">
        <p>
          The question can be thought of as an opinion. It depends on who is being asked
          the question or how it’s interacted with.
        </p>

        <p class="section-title">Could be seen as:</p>

        <ul>
          <li>nothing</li>
          <li>a tool</li>
          <li>a way of life</li>
          <li>a meme</li>
          <li>a reminder</li>
          <li>inspiration</li>
          <li>a learning opportunity</li>
          <li>art</li>
        </ul>

        <p class="footer-text">
          Today is April 17, 2026. What DFI is today could have new meaning by tomorrow.
        </p>
      </div>
    </div>
  `;
}

function toggleDFIPost() {
  const content = document.getElementById('dfiPostContent');
  if (!content) return;

  if (content.style.display === 'none' || content.style.display === '') {
    content.style.display = 'block';
  } else {
    content.style.display = 'none';
  }
}

/* navigation */
function show(type) {
  if (type === 'form') {
    sideInfo.innerHTML = `
      <p>
        The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
      </p>
      <p>(select to view the code)</p>
      <p>Screenshot or copy text to save a form</p>
    `;
    return;
  }

  if (type === 'privacy') {
    sideInfo.innerHTML = `
      <p>
        The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
      </p>
      <p>(select to view the code)</p>
    `;
    return;
  }

  if (type === 'formula') {
    sideInfo.innerHTML = `
      <p>A calculation to see how the theories on .forum came from using the art of thought.</p>
      <p><strong>art + thought = theory</strong></p>
    `;
    return;
  }

  if (type === 'forum') {
    renderDefaultMessage();
    sideInfo.innerHTML = `
      <p>
        Information and beliefs from the artist’s mind behind DFI.
      </p>
    `;
    return;
  }
}

dateBtn.addEventListener('click', () => {
  alert("Date button clicked.");
});

renderDefaultMessage();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFI Forum Browser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="browser-window">

    <div class="search-container">
      <input type="text" placeholder="Search">
      <button id="dateBtn">Date</button>
    </div>

    <div class="button-field" id="postField">
      <iframe
        id="privacyLight"
        class="privacy-light-frame"
        src="light.html"
        title="Privacy Light"
      ></iframe>

      <div class="floating-post">
        <div class="post-preview">
          <div class="dfi-box">
            <h2 class="post-title">What is DFI?</h2>
            <div class="post-content">
              DFI is an art project, belief system, and digital realm built from the artist’s mind behind DrugFreeInu.
            </div>
          </div>
        </div>
      </div>

      <div class="floating-post">
        <div class="post-preview">
          <div class="dfi-box">
            <h2 class="post-title">When did DFI begin?</h2>
            <div class="post-content">
              DFI began as DrugFreeInu and later evolved into a larger archive of art, symbolism, entities, beliefs, and personal mythology.
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="menuMount">
      <div id="menuButtons"></div>
      <div class="side-info" id="sideInfo"></div>
    </div>

  </div>

  <script src="js/floatingPosts.js"></script>
  <script src="js/app.js"></script>

</body>
</html>

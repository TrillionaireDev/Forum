<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DFI</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* field */
.field {
  position: relative;
  width: 100%;
  height: 110px;
  overflow: visible;
}

/* ground / horizon line */
.field::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 14px;
  height: 2px;
  background: rgba(65, 120, 65, 0.45);
  z-index: 1;
}

/* measure */
.measure {
  position: absolute;
  visibility: hidden;
  white-space: pre;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
}

/* INPUT */
.field input {
  position: relative;
  z-index: 5;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: "Chalkboard SE", "Comic Sans MS", cursive;
  font-size: 26px;
  color: #777;
  padding: 0 16px;
}

/* hide default placeholder */
.field input::placeholder {
  color: transparent;
}

/* grass */
.grass-strip {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 14px;
  height: 76px;
  z-index: 2;
  pointer-events: none;
  overflow: visible;
}

.blade {
  position: absolute;
  bottom: 0;
  width: 3px;
  border-radius: 50% 50% 0 0;
  transform-origin: bottom center;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
  transition: height 180ms ease, transform 180ms ease;
}

/* clippings */
.clippings {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: visible;
}

.clip-piece {
  position: absolute;
  width: 3px;
  border-radius: 50% 50% 0 0;
  clip-path: polygon(50% 0%,70% 20%,100% 100%,0% 100%,30% 20%);
  transform-origin: bottom center;
  animation: fall 650ms ease-in forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(var(--start-rot)); opacity: 0.95; }
  100% {
    transform: translateY(var(--fall-y)) translateX(var(--drift-x)) rotate(var(--end-rot));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="field" id="field">
  <div class="grass-strip" id="grass"></div>
  <div class="clippings" id="clippings"></div>

  <input 
    id="grassInput"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    autocomplete="off"
  />

  <span class="measure" id="measure"></span>
</div>

<script>
const field = document.getElementById("field");
const grassStrip = document.getElementById("grass");
const clippings = document.getElementById("clippings");
const input = document.getElementById("grassInput");
const measure = document.getElementById("measure");

const bladeCount = 140;
const blades = [];
const leftPadding = 16;

let prevTextWidth = 0;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function makeBlade(i) {
  const blade = document.createElement("div");
  blade.className = "blade";

  let baseHeight;
  const r = Math.random();

  if (r < 0.2) baseHeight = rand(14, 24);
  else if (r < 0.7) baseHeight = rand(24, 46);
  else baseHeight = rand(46, 72);

  const tilt = rand(-14, 14);
  const hue = rand(105, 128);
  const light = rand(26, 44);

  blade.dataset.baseHeight = baseHeight;
  blade.dataset.currentHeight = baseHeight;
  blade.dataset.baseTilt = tilt;

  blade.style.left = `${i * (100 / bladeCount)}%`;
  blade.style.height = `${baseHeight}px`;
  blade.style.transform = `rotate(${tilt}deg)`;
  blade.style.background = `hsl(${hue}, 50%, ${light}%)`;

  grassStrip.appendChild(blade);
  blades.push(blade);
}

for (let i = 0; i < bladeCount; i++) makeBlade(i);

function getTextWidth() {
  measure.textContent = input.value || "";
  return measure.offsetWidth;
}

function updateGrass(e) {
  const textWidth = getTextWidth();
  const cutStart = leftPadding;
  const cutEnd = leftPadding + textWidth;

  blades.forEach((blade) => {
    const baseHeight = parseFloat(blade.dataset.baseHeight);
    const baseTilt = parseFloat(blade.dataset.baseTilt);

    let influence = 0;
    const bladeCenter = blade.offsetLeft + 1.5;

    if (bladeCenter >= cutStart && bladeCenter <= cutEnd) influence = 1;

    const targetHeight = Math.max(5, baseHeight * (1 - influence * 0.75));
    const newTilt = baseTilt * (1 - influence * 0.6);

    blade.style.height = `${targetHeight}px`;
    blade.style.transform = `rotate(${newTilt}deg)`;
  });

  prevTextWidth = textWidth;
}

input.addEventListener("input", updateGrass);
updateGrass();
</script>

</body>
</html>

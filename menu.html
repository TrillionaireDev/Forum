<style>
body {
  background: #0a0a0a;
  color: #ccc;
  font-family: system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* content area */
#content {
  margin-top: 40px;
  max-width: 600px;
  padding: 20px;
}

/* stack container */
.stack {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin: 20px;
}

/* buttons */
button {
  background: #111;
  border: none;
  color: #777;
  font-size: 12px;
  padding: 6px 10px;
  margin: 2px 0;
  cursor: pointer;

  /* base stack */
  box-shadow:
    -1px -1px 0 #444,
    -2px -2px 0 #3a3a3a,
    -3px -3px 0 #333,
    -4px -4px 0 #2a2a2a,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

/* hover = slight depth change (no movement) */
button:hover {
  color: #fff;

  box-shadow:
    -1px -1px 0 #666,
    -2px -2px 0 #555,
    -3px -3px 0 #444,
    -4px -4px 0 #333,
    -5px -5px 0 #222,
    -6px -6px 0 #1a1a1a,
    -7px -7px 0 #111;
}

/* active = press into stack */
button:active {
  box-shadow:
    -1px -1px 0 #333,
    -2px -2px 0 #222,
    -3px -3px 0 #111;
}
</style>

<div id="content"></div>

<div class="stack">
  <button onclick="show('form')">form</button>
  <button onclick="show('forum')">forum</button>
  <button onclick="show('privacy')">privacy</button>
  <button onclick="show('formula')">.formula</button>
</div>

<script>
function show(type) {
  const content = document.getElementById('content');

  if (type === 'privacy') {
    content.innerHTML = `
      The form submission on drugfreeinu.forum is built from code that doesn’t send, save, or record anything that is typed into the form.
      <br><br>(select to view the code)
    `;
  }

  if (type === 'formula') {
    content.innerHTML = `
      A calculation to see how the theories on .forum came from using the art of thought.
      <br><br><strong>art + thought = theory</strong>
    `;
  }

  if (type === 'forum') {
    content.innerHTML = \`<!-- your posts here -->\`;
  }

  if (type === 'form') {
    content.innerHTML = \`<!-- your form here -->\`;
  }
}
</script>
